name: Deploy Kafka-Redis Stack to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Docker Buildx (for optimized builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. Login to DockerHub (Requires DOCKER_USERNAME and DOCKER_PASSWORD in GitHub Secrets)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build and Push Producer Image
      - name: Build and Push Producer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.producer
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kafka-producer:latest

      # 4. Build and Push Tracker (Consumer) Image
      - name: Build and Push Tracker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.tracker
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kafka-consumer:latest

      # 5. Setup kubectl (Requires KUBECONFIG in GitHub Secrets)
      - name: Set up Kubeconfig
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      # 6. Deploy to Kubernetes Cluster
      - name: Deploy Manifests
        run: |
          kubectl apply -f redis-deployment.yaml
          kubectl apply -f redis-service.yaml
          kubectl apply -f kafka-deployment.yaml
          kubectl apply -f kafka-service.yaml
          kubectl apply -f producer-deployment.yaml
          kubectl apply -f consumer-deployment.yaml
          kubectl apply -f kafka-ui-deployment.yaml
          kubectl apply -f redis-commander-deploymant.yaml

      # 7. Verify Deployment Status
      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/kafka
          kubectl rollout status deployment/kafka-consumer