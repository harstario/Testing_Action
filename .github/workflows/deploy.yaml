jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Build and Push Producer
      - name: Build and Push Producer
        uses: docker/build-push-action@v5
        with:
          context: ./producer
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kafka-producer:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/kafka-producer:latest

      # 3. Build and Push Consumer
      - name: Build and Push Consumer
        uses: docker/build-push-action@v5
        with:
          context: ./consumer
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kafka-consumer:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/kafka-consumer:latest

      # 4. Create kubeconfig file (fixes YAML error)
      - name: Create kubeconfig file
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig
          mkdir -p ~/.kube
          cp kubeconfig ~/.kube/config

      # 5. Set Kubernetes Context
      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: kubeconfig

      # 6. Deploy to Cluster
      - name: Deploy to Cluster
        run: |
          kubectl apply -f k8s/kafka-deployment.yaml
          kubectl apply -f k8s/producer-deployment.yaml
          kubectl apply -f k8s/consumer-deployment.yaml

          # Force update to the specific image version we just built
          kubectl set image deployment/kafka-producer producer=${{ secrets.DOCKERHUB_USERNAME }}/kafka-producer:${{ github.sha }}
          kubectl set image deployment/kafka-consumer consumer=${{ secrets.DOCKERHUB_USERNAME }}/kafka-consumer:${{ github.sha }}